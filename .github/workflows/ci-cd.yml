name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================
  # 1. Kiểm thử Django Backend
  # ============================================
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: flake8 . --count --statistics --max-line-length=140 --ignore=E127,E225,E226,E231,E302,E305,E401,E402,E701,E702,F401,F541,F841,W503,W504 --exclude=venv,node_modules,frontend,migrations,__pycache__,*.pyc

      - name: Run Django Tests
        run: python manage.py test products --verbosity=2
        env:
          SECRET_KEY: github-actions-ci-secret-not-for-production
          DEBUG: "False"

  # ============================================
  # 2. Kiểm thử Frontend React
  # ============================================
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint with ESLint
        run: |
          cd frontend
          npm run lint

      - name: Build (TypeScript check + Vite build)
        run: |
          cd frontend
          npm run build

  # ============================================
  # 3. Deploy tự động lên Hostinger VPS
  # ============================================
  deploy:
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on Hostinger VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            PROJECT_DIR=/root/Du_An_Bao_Giao

            # Clone nếu chưa có
            if [ ! -d "$PROJECT_DIR/.git" ]; then
              mkdir -p "$PROJECT_DIR"
              git clone https://github.com/quocdat16061990/Du_An_Bao_Giao.git "$PROJECT_DIR"
            fi

            cd "$PROJECT_DIR"
            # Luôn đồng bộ với GitHub (force sync)
            git fetch origin main
            git reset --hard origin/main

            # Tạo file .env nếu chưa có
            mkdir -p "$PROJECT_DIR/backend"
            if [ ! -f "$PROJECT_DIR/backend/.env" ]; then
              echo 'SECRET_KEY=thay-bang-secret-key-that-cua-ban' > "$PROJECT_DIR/backend/.env"
              echo 'DEBUG=False' >> "$PROJECT_DIR/backend/.env"
              echo 'DATABASE_URL=postgresql://user:password@host:5432/dbname' >> "$PROJECT_DIR/backend/.env"
            fi

            # Đảm bảo network traefik tồn tại
            docker network create traefik 2>/dev/null || true

            docker compose config
            docker compose build --pull --no-cache backend frontend
            docker compose up -d --remove-orphans

            echo "Waiting for backend health..."
            for i in $(seq 1 30); do
              if docker compose exec -T frontend wget -qO- http://backend:8000/api/v1/categories/ >/dev/null 2>&1; then
                echo "Backend is healthy"
                break
              fi

              if [ "$i" -eq 30 ]; then
                echo "Backend health check failed"
                docker compose ps
                docker compose logs --tail=120 backend frontend
                exit 1
              fi

              sleep 3
            done

            if command -v curl >/dev/null 2>&1; then
              curl -kfsS https://luanmienam.devoverflow.xyz/api/v1/categories/ >/dev/null
            fi

            docker image prune -f
